/* ══════════════ 상태 ══════════════ */
let LANG = 'vi';
try{ LANG = localStorage.getItem('jss_lang') || 'vi'; }catch(e){}
let ACTIVE_CAT = '__all__';
const fmt = n => Number(n).toLocaleString('vi-VN') + '₫';

/* ══════════════ 렌더링 ══════════════ */
function applyStatics(){
  document.querySelectorAll('[data-t]').forEach(el=>{ el.textContent = T[LANG][el.dataset.t]||''; });
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on', b.dataset.lang===LANG));
  document.documentElement.lang = LANG==='zh'?'zh-CN':LANG;
}
function renderCats(){
  const strip=document.getElementById('catStrip'); strip.innerHTML='';
  const mk=(key,label)=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(ACTIVE_CAT===key?' on':''); b.textContent=label;
    b.onclick=()=>{ACTIVE_CAT=key;renderCats();renderMenu();};
    strip.appendChild(b);
  };
  mk('__all__', T[LANG].all);
  CATS.forEach(c=>mk(c.id, c.n[LANG]));
}
function renderMenu(){
  const wrap=document.getElementById('menuWrap'); wrap.innerHTML='';
  CATS.filter(c=>ACTIVE_CAT==='__all__'||c.id===ACTIVE_CAT).forEach(cat=>{
    const items=MENU.filter(m=>m.cat===cat.id);
    if(!items.length) return;
    const h=document.createElement('h2'); h.className='cat-title'; h.textContent=cat.n[LANG]; wrap.appendChild(h);
    const grid=document.createElement('div'); grid.className='cards';
    items.forEach(item=>grid.appendChild(card(item)));
    wrap.appendChild(grid);
  });
}
function card(item){
  const el=document.createElement('article'); el.className='card';
  const name=item.n[LANG];
  const alt=LANG==='vi'?item.n.ko:item.n.vi;
  const badge=item.badge?`<span class="item-badge">${item.badge[LANG]}</span>`:'';
  const spice=item.s?`<span class="tag-spice">🌶</span>`:'';
  const desc=item.d?`<div class="card-sub">${item.d[LANG]}</div>`:'';

  const variants=item.vx?item.vx:(item.v?item.v.map((p,i)=>({sz:SZ[i],p})):null);
  let priceHtml, sizeHtml='';
  if(variants){
    priceHtml=`<span class="price">${fmt(variants[0].p)}</span>`;
    sizeHtml=`<div class="sizes">`+variants.map((vv,i)=>
      `<button class="size-chip${i===0?' on':''}" data-p="${vv.p}">${T[LANG][vv.sz]}</button>`).join('')+`</div>`;
  }else{
    priceHtml=`<span class="price">${fmt(item.p)}</span>`;
  }
  el.innerHTML=`<div class="card-body">
      <div class="card-name">${name}${spice}${badge}</div>
      ${alt&&alt!==name?`<div class="card-sub">${alt}</div>`:''}
      ${desc}
      <div class="price-row">${priceHtml}${sizeHtml}</div>
    </div>`;
  el.querySelectorAll('.size-chip').forEach(chip=>{
    chip.onclick=()=>{
      el.querySelectorAll('.size-chip').forEach(c=>c.classList.remove('on'));
      chip.classList.add('on');
      el.querySelector('.price').textContent=fmt(chip.dataset.p);
    };
  });
  return el;
}
function setLang(l){
  LANG=l; try{localStorage.setItem('jss_lang',l);}catch(e){}
  applyStatics(); renderCats(); renderMenu();
}
applyStatics(); renderCats(); renderMenu();
</script>
